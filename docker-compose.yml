# API needs a file `aws-credentials.env` (same folder as this compose file) so Docker Compose
# always passes environment into the container. Create it before first run:
#
#   cp aws-credentials.env.example aws-credentials.env
#
# Then set keys inside that file — OR leave keys blank and rely on the host ~/.aws mount below,
# OR on EC2 with an instance profile you may use `touch aws-credentials.env` and rely on IMDS
# (works for many Docker-on-EC2 setups; use ECS task role + secrets for production).
#
# Host `aws configure`: credentials live in ~/.aws (mounted into the container).
# If you run `sudo docker compose`, HOME becomes /root and the mount may be empty — use:
#   sudo -E docker compose up api
# or:
#   HOST_AWS_CREDENTIALS_DIR=/home/YOUR_LINUX_USER/.aws docker compose up api
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8800:8000"
    env_file:
      - aws-credentials.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/seeds:/app/seeds:ro
      - ./backend/requirements.txt:/app/requirements.txt:ro
      - ${HOST_AWS_CREDENTIALS_DIR:-$HOME/.aws}:/root/.aws:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-infraguys-headless-cms}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-infra_guys_website_main}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_HOST_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # Browser talks to host port WEB_HOST_PORT; HMR must use the same public port.
      - VITE_HMR_CLIENT_PORT=${WEB_HOST_PORT:-5174}
    command: ["/usr/local/bin/docker-entrypoint.sh", "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  web_node_modules:
