# API needs AWS credentials for DynamoDB.
#
# Docker: run from THIS directory (headless-cms) so ./aws-credentials.env is found:
#   cp aws-credentials.env.example aws-credentials.env
#   # edit aws-credentials.env — no quotes, no spaces around =
#   docker compose up api
#
# Or point Compose at another file: AWS_ENV_FILE=/absolute/path/keys.env docker compose up api
#
# The api service mounts host ~/.aws so `aws configure` credentials are visible in the container.
#
# On EC2/ECS/Lambda: attach an IAM role with DynamoDB access to the task/instance (no .env file needed).
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8800:8000"
    env_file:
      - path: ${AWS_ENV_FILE:-./aws-credentials.env}
        required: false
    volumes:
      - ./backend/app:/app/app
      - ./backend/seeds:/app/seeds:ro
      - ./backend/requirements.txt:/app/requirements.txt:ro
      - ~/.aws:/root/.aws:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-infraguys-headless-cms}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-infra_guys_website_main}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_HOST_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # Browser talks to host port WEB_HOST_PORT; HMR must use the same public port.
      - VITE_HMR_CLIENT_PORT=${WEB_HOST_PORT:-5174}
    command: ["/usr/local/bin/docker-entrypoint.sh", "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  web_node_modules:
