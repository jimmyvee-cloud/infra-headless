# Stack needs a `.env` file beside this compose file (copy from `.env.example`).
# Compose injects it into the `api` container. Typical workflow:
#
#   cp .env.example .env
#   nano .env    # set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (or leave blank if ~/.aws mount is enough)
#   docker compose up -d --force-recreate api
#
# Host AWS CLI credentials: we mount `~/.aws`. With `sudo docker compose`, HOME is often /root → empty mount.
# Fix: `sudo -E docker compose up api` or `HOST_AWS_CREDENTIALS_DIR=/home/YOU/.aws docker compose up api`
#
# EC2 instance profile: often works from inside the container; leave AWS keys blank in `.env` if so.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8800:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./backend/seeds:/app/seeds:ro
      - ./backend/requirements.txt:/app/requirements.txt:ro
      - ${HOST_AWS_CREDENTIALS_DIR:-$HOME/.aws}:/root/.aws:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-infraguys-headless-cms}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-infra_guys_website_main}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_HOST_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_DEV_HOST=0.0.0.0
      - VITE_HMR_CLIENT_PORT=${WEB_HOST_PORT:-5174}
      - VITE_API_PROXY_TARGET=http://api:8000
      # Set true in root `.env` to run the SPA with no Dynamo/API delivery fetches (bundled pages only).
      - VITE_STATIC_DELIVERY=${VITE_STATIC_DELIVERY:-false}
    command: ["/usr/local/bin/docker-entrypoint.sh", "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  web_node_modules:
