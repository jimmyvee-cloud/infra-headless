# API needs AWS credentials for DynamoDB (inside the `api` container).
#
# Pick at least ONE:
#
# 1) Project `.env` (recommended): cp .env.example .env  → set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
#    Compose loads `.env` into the api service automatically (env_file below).
#
# 2) `aws-credentials.env`: cp aws-credentials.env.example aws-credentials.env → fill in keys
#
# 3) Host `aws configure`: credentials in ~/.aws — we mount that dir into the container.
#    If you use `sudo docker compose`, HOME is often /root and the mount is EMPTY. Fix with:
#      sudo -E docker compose up api
#    or:
#      HOST_AWS_CREDENTIALS_DIR=/home/YOUR_LINUX_USER/.aws docker compose up api
#
# On EC2/ECS/Lambda: use an IAM role on the task/instance; you can comment out the ~/.aws volume.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8800:8000"
    env_file:
      - path: ${AWS_ENV_FILE:-./aws-credentials.env}
        required: false
      - path: .env
        required: false
    volumes:
      - ./backend/app:/app/app
      - ./backend/seeds:/app/seeds:ro
      - ./backend/requirements.txt:/app/requirements.txt:ro
      - ${HOST_AWS_CREDENTIALS_DIR:-$HOME/.aws}:/root/.aws:ro
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DYNAMODB_TABLE=${DYNAMODB_TABLE:-infraguys-headless-cms}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-infra_guys_website_main}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_HOST_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # Browser talks to host port WEB_HOST_PORT; HMR must use the same public port.
      - VITE_HMR_CLIENT_PORT=${WEB_HOST_PORT:-5174}
    command: ["/usr/local/bin/docker-entrypoint.sh", "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  web_node_modules:
